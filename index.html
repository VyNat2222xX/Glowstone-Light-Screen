<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="styles.css" />
	<title>Glowstone Light Screen</title>
</head>

<body class="light-off">
	<dialog id="menu">
		<form id="light-form" method="dialog" novalidate>
			<h3>Turn <code id="menu-code-status">ON</code> Light ?</h3>
			<label for="brightness">Brightness (1 - 100)</label>
			<input type="number" id="brightness" min="1" max="100" placeholder="50" />
			<span id="brightness-error" class="error"></span>
			<button type="submit">
				<h5>Turn <span id="menu-span-status">ON</span> Light</h5>
			</button>
		</form>
	</dialog>
	<main>
		<section id="light-section">
			<h1>Light Your Screen !</h1>
			<img id="glowstone" src="assets/glowstone-off.webp" alt="glowstone-off" />
			<button id="light">
				<h2>Switch Light</h2>
			</button>
		</section>
		<section id="log-section">
			<h2>Action Log</h2>
			<ul id="log-list"></ul>
		</section>
	</main>
	<script src="app.js"></script>
</body>

</html>
